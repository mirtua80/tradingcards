:root{
  --bg:#F4F6F0; --surface:#FFFFFF; --surface-2:#EAF0E6; --line:#D7DECF;
  --text:#1C2419; --text-dim:#5E6D5A; --gold:#B9821E; --teal:#1E8A6E; --rust:#B85229;
  --foil-a:#E7B84B; --foil-b:#3FA37E; --foil-c:#8FD9BE; --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:76px;}
h1,h2,h3{font-family:'Big Shoulders Display',sans-serif;font-weight:800;letter-spacing:0.01em;margin:0;text-transform:uppercase;}
.mono{font-family:'IBM Plex Mono',monospace;}

.setup-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;}
.setup-title{font-size:38px;line-height:0.95;color:var(--text);}
.setup-title span{color:var(--gold);}
.setup-sub{color:var(--text-dim);font-size:14px;margin:10px 0 28px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:6px;}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);padding:13px 14px;border-radius:var(--radius);font-size:16px;font-family:inherit;}
.field textarea{font-family:'IBM Plex Mono';font-size:12px;min-height:140px;resize:vertical;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
.field-hint{font-size:12px;color:var(--text-dim);margin-top:6px;}
.btn{background:var(--gold);color:#14201A;border:none;padding:14px 20px;border-radius:var(--radius);font-family:'Big Shoulders Display',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;font-size:16px;cursor:pointer;width:100%;}
.btn:active{transform:translateY(1px);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-danger{background:var(--rust);color:#fff;}
.btn-small{width:auto;padding:8px 14px;font-size:13px;border-radius:8px;}
.link-btn{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;text-decoration:underline;padding:0;}

header.topbar{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line);padding:14px 18px 12px;}
.topbar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.topbar-row h1{font-size:22px;}
.topbar-row .group-code{font-size:11px;color:var(--text-dim);}
.progress-track{height:8px;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid var(--line);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:6px;font-family:'IBM Plex Mono',monospace;}

nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--surface);border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;}
nav.tabbar button{flex:1;background:none;border:none;color:var(--text-dim);padding:12px 4px 10px;font-family:'IBM Plex Sans';font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
nav.tabbar button .ic{font-size:18px;}
nav.tabbar button.active{color:var(--gold);}
nav.tabbar button .badge{position:absolute;top:2px;right:14px;background:var(--rust);color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;font-family:'IBM Plex Mono';}

main{flex:1;padding:16px 16px 24px;}

.team-section{margin-bottom:22px;}
.team-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 8px 2px;border-bottom:1px dashed var(--line);margin-bottom:10px;cursor:pointer;}
.team-header h3{font-size:15px;color:var(--text);}
.team-header .count{font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);}
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px;}
.sticker{min-height:112px;border-radius:6px;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'IBM Plex Mono';font-size:10px;user-select:none;transition:transform .1s;text-align:center;padding:8px 4px;gap:4px;}
.sticker:active{transform:scale(0.94);}
.sticker.falta{background:transparent;border:1px dashed var(--line);color:var(--text-dim);opacity:0.55;}
.sticker.tengo{background:var(--surface-2);border:1px solid var(--teal);color:var(--text);box-shadow:0 2px 0 rgba(0,0,0,.3);}
.sticker.repetido{background:linear-gradient(135deg,var(--foil-a),var(--foil-b) 60%,var(--foil-c));color:#14201A;border:1px solid var(--gold);box-shadow:0 2px 0 rgba(0,0,0,.35);transform:rotate(-1.2deg);}
.sticker .num{font-weight:700;font-size:11px;}
.sticker .pname{font-family:'IBM Plex Sans';font-size:10px;line-height:1.2;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
.sticker.falta .pname{opacity:0.85;}
.sticker .dup-badge{position:absolute;top:-6px;right:-6px;background:var(--rust);color:#fff;border-radius:9px;font-size:9px;padding:1px 5px;font-family:'IBM Plex Mono';}
.pphoto{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-size:11px;color:var(--text-dim);flex-shrink:0;border:1px solid var(--line);}
.sticker.tengo .pphoto,.sticker.repetido .pphoto{border-color:rgba(0,0,0,.2);}
.pphoto img{width:100%;height:100%;object-fit:cover;display:block;}
.pinit{font-weight:700;}
.section-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.section-nav select{
  flex:1;background:var(--surface);border:1px solid var(--line);color:var(--text);
  padding:11px 12px;border-radius:var(--radius);font-size:14px;font-family:'IBM Plex Sans';
  font-weight:600;appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%235E6D5A'><path d='M5.5 7.5l4.5 4.5 4.5-4.5' stroke='%235E6D5A' stroke-width='1.5' fill='none'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;
}
.section-nav select:focus{outline:none;border-color:var(--gold);}
.nav-arrow{
  flex-shrink:0;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.nav-arrow:active{background:var(--surface-2);}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:11px;color:var(--text-dim);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.leg-falta{border:1px dashed var(--line);}
.leg-tengo{background:var(--surface-2);border:1px solid var(--teal);}
.leg-rep{background:linear-gradient(135deg,var(--foil-a),var(--foil-b));}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.row + .row{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
.item-name{font-size:14px;}
.item-sub{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono';}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-size:15px;cursor:pointer;line-height:1;}
.pill{border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
.pill.on{background:var(--gold);color:#14201A;border-color:var(--gold);font-weight:600;}
.friend-progress{flex:1;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin:0 10px;border:1px solid var(--line);}
.friend-progress i{display:block;height:100%;background:var(--teal);}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.6;}
.empty-state h3{color:var(--text);font-size:18px;margin-bottom:8px;}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:20px 0 10px;}
.section-title:first-child{margin-top:0;}
.interest-flag{color:var(--gold);font-size:11px;}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20;display:flex;align-items:flex-end;}
.modal{background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:16px 16px 0 0;max-height:85vh;display:flex;flex-direction:column;border-top:1px solid var(--line);}
.modal-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-body{overflow-y:auto;padding:12px 18px;}
.modal-foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px;}
.close-x{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}
.top-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.small-note{font-size:11px;color:var(--text-dim);margin-top:4px;}

.admin-note{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-dim);margin-bottom:14px;line-height:1.5;}
.group-row{cursor:pointer;}
.group-row:hover{color:var(--gold);}
.tag{font-size:9px;padding:1px 6px;border-radius:8px;border:1px solid var(--line);color:var(--text-dim);margin-left:6px;}
</style>

function parseCardsTSV(tsv){
  const lines = tsv.split('\n').map(l=>l.trim()).filter(Boolean);
  return lines.map(l=>{
    const [num,name,section,tag] = l.split('|');
    return { id:'C'+num.trim(), num:parseInt(num.trim(),10), name:name.trim(), section:section.trim(), tag:(tag||'').trim() };
  });
}

let state = {
  username:null, groupCode:null, isAdmin:false,
  checklist:null,      // {cards:[...], sectionNames:{...}}
  me:null, members:[], membersData:{}, interests:{},
  tab:'album', collapsed:{}, loaded:false, searchQuery:'', photoCache:{}, onlyMissing:false,

async function ensureAuth(){
  if(!auth.currentUser){
    await auth.signInAnonymously();
  }
}

async function getChecklist(){
  const ref = db.collection('checklist').doc('current');
  const snap = await ref.get();
  if(snap.exists) return snap.data();
  const initial = { cards: parseCardsTSV(CARDS_TSV), sectionNames: SECTION_NAMES_DEFAULT, order: SECTION_ORDER };
  await ref.set(initial);
  return initial;
}
async function saveChecklist(data){
  await db.collection('checklist').doc('current').set(data);
}

function defaultMe(){ return { stickers:{}, counts:{} }; }

async function loadGroup(){
  const gc = state.groupCode;
  const groupRef = db.collection('groups').doc(gc);
  const groupSnap = await groupRef.get();
  if(!groupSnap.exists){ await groupRef.set({ createdAt: Date.now(), interests:{} }); }
  const groupData = (await groupRef.get()).data();
  state.interests = groupData.interests || {};

  const meRef = groupRef.collection('users').doc(state.username);
  const meSnap = await meRef.get();
  if(!meSnap.exists){ await meRef.set(defaultMe()); }
  state.me = (await meRef.get()).data();

  const usersSnap = await groupRef.collection('users').get();
  const membersData = {};
  usersSnap.forEach(doc=>{ if(doc.id !== state.username) membersData[doc.id] = doc.data(); });
  state.members = Object.keys(membersData);
  state.membersData = membersData;
  state.loaded = true;
}

async function saveMe(){ await db.collection('groups').doc(state.groupCode).collection('users').doc(state.username).set(state.me); }
async function saveInterests(){ await db.collection('groups').doc(state.groupCode).update({ interests: state.interests }); }

function allCards(){ return state.checklist.cards; }
function cardsBySection(sec){ return allCards().filter(c=>c.section===sec); }
function labelFor(card){ return { title: card.name, sub: card.tag || ('#'+card.num) }; }

function statusOf(dataObj, id){ return (dataObj.stickers && dataObj.stickers[id]) || 0; }
function countOf(dataObj, id){ return (dataObj.counts && dataObj.counts[id]) || 2; }
function myProgress(){ return Object.values(state.me.stickers||{}).filter(s=>s>0).length; }
function progressOf(dataObj){ return Object.values(dataObj.stickers||{}).filter(s=>s>0).length; }

async function cycleSticker(id){
  const cur = statusOf(state.me, id);
  const next = (cur+1)%3;
  state.me.stickers[id] = next;
  if(next===2 && !state.me.counts[id]) state.me.counts[id]=2;
  if(next!==2) delete state.me.counts[id];
  render(); await saveMe();
}
async function bumpCount(id, delta){
  state.me.counts[id] = Math.max(2, countOf(state.me,id)+delta);
  render(); await saveMe();
}
async function toggleInterest(ownerUsername, id){
  if(!state.interests[ownerUsername]) state.interests[ownerUsername] = {};
  if(!state.interests[ownerUsername][id]) state.interests[ownerUsername][id] = [];
  const arr = state.interests[ownerUsername][id];
  const i = arr.indexOf(state.username);
  if(i>=0) arr.splice(i,1); else arr.push(state.username);
  render(); await saveInterests();
}
function toggleCollapse(key){ state.collapsed[key] = !state.collapsed[key]; render(); }
function switchTab(tab){ state.tab = tab; render(); }

/* ---------- Fotos de jugadores (Wikipedia, gratuito) ---------- */
function initialsHTML(name){
  const words = name.replace(/\(.*?\)/g,'').trim().split(/\s+/).filter(Boolean);
  const letters = words.slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<span class="pinit">${letters||'?'}</span>`;
}
function placeholderFor(c){
  if(c.name === 'Escudo') return '🛡️';
  if(c.section === 'SPEC') return '★';
  if(c.section === 'CONT') return '🌍';
  return initialsHTML(c.name);
}
function isPhotoEligible(c){
  return c.name !== 'Escudo' && c.section !== 'SPEC' && c.section !== 'CONT' && !c.name.includes('(revisar)') && !c.name.startsWith('Jugador ');
}
async function fetchPlayerPhoto(name){
  if(state.photoCache[name] !== undefined) return state.photoCache[name];
  let url = null;
  try{
    const resp = await fetch('https://es.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(name.replace(/\s+/g,'_')));
    if(resp.ok){
      const data = await resp.json();
      if(data.thumbnail && data.thumbnail.source) url = data.thumbnail.source;
    }
  }catch(e){ /* sin conexión o no encontrado */ }
  state.photoCache[name] = url;
  return url;
}
function loadPhotosCapped(cards){
  const MAX = 90;
  if(cards.length > MAX) return; // evita cientos de peticiones a Wikipedia de golpe (ej. "Todos" sin filtrar)
  loadPhotosFor(cards);
}
function loadPhotosFor(cards){
  cards.forEach(c=>{
    if(!isPhotoEligible(c)) return;
    if(state.photoCache[c.name] !== undefined){
      const el = document.getElementById('ph-'+c.id);
      if(el) el.innerHTML = state.photoCache[c.name] ? `<img src="${state.photoCache[c.name]}" alt="">` : initialsHTML(c.name);
      return;
    }
    fetchPlayerPhoto(c.name).then(url=>{
      const el = document.getElementById('ph-'+c.id);
      if(!el) return;
      el.innerHTML = url ? `<img src="${url}" alt="">` : initialsHTML(c.name);
    });
  });
}

async function loadAdminGroups(){
  const snap = await db.collection('groups').get();
  const groups = [];
  for(const doc of snap.docs){
    const usersSnap = await doc.ref.collection('users').get();
    let totalGot = 0;
    usersSnap.forEach(u=>{ totalGot += progressOf(u.data()); });
    groups.push({ code: doc.id, memberCount: usersSnap.size, avgGot: usersSnap.size ? Math.round(totalGot/usersSnap.size) : 0 });
  }
  state.adminGroups = groups;
}

async function selectAdminGroup(code){
  state.adminSelected = code;
  const usersSnap = await db.collection('groups').doc(code).collection('users').get();
  const members = [];
  usersSnap.forEach(u=> members.push({ username:u.id, got: progressOf(u.data()) }));
  state.adminSelectedData = members;
  render();
}

async function deleteAdminGroup(code){
  if(!confirm('¿Borrar el grupo "'+code+'" y todos sus datos? Esta acción no se puede deshacer.')) return;
  const usersSnap = await db.collection('groups').doc(code).collection('users').get();
  const batch = db.batch();
  usersSnap.forEach(u=> batch.delete(u.ref));
  batch.delete(db.collection('groups').doc(code));
  await batch.commit();
  state.adminSelected = null;
  await loadAdminGroups();
  render();
}

async function removeAdminMember(code, username){
  if(!confirm('¿Eliminar a "'+username+'" del grupo?')) return;
  await db.collection('groups').doc(code).collection('users').doc(username).delete();
  await selectAdminGroup(code);
  await loadAdminGroups();
}

function setAdminView(v){ state.adminView = v; state.adminSelected = null; render(); }

/* ================================================================
   ALBUM / REPETIDOS / AMIGOS / CAMBIOS (usuario normal)
   ================================================================ */
function visibleSections(){ return state.checklist.order.filter(sec => cardsBySection(sec).length>0); }
function computeMatches(q){
  q = (q||'').trim().toLowerCase();
  if(!q) return null;
  return allCards().filter(c=>{
    const secName = (state.checklist.sectionNames[c.section]||c.section).toLowerCase();
    return c.name.toLowerCase().includes(q) || String(c.num).includes(q) || secName.includes(q) || c.section.toLowerCase().includes(q);
  });
}

function navSections(){ return ['__ALL__', ...visibleSections()]; }
function currentCards(){ return state.currentSection==='__ALL__' ? allCards() : cardsBySection(state.currentSection); }
function renderAlbum(){
  const q = (state.searchQuery||'');
  const navSecs = navSections();
  if(!state.currentSection || !navSecs.includes(state.currentSection)) state.currentSection = navSecs[0];
  const options = navSecs.map(sec=>{
    if(sec==='__ALL__'){
      let got=0; const total=allCards().length; for(const c of allCards()) if(statusOf(state.me,c.id)>0) got++;
      return `<option value="__ALL__" ${state.currentSection==='__ALL__'?'selected':''}>Todos (${got}/${total})</option>`;
    }
    const cards = cardsBySection(sec);
    let got=0; for(const c of cards) if(statusOf(state.me,c.id)>0) got++;
    const name = state.checklist.sectionNames[sec] || sec;
    return `<option value="${sec}" ${sec===state.currentSection?'selected':''}>${name} (${got}/${cards.length})</option>`;
  }).join('');
  return `
    <div class="field" style="margin-bottom:10px;">
      <input id="search-box" type="text" placeholder="Buscar por selección, número o jugador…" value="${q.replace(/"/g,'&quot;')}">
    </div>
    <div class="section-nav">
      <button class="nav-arrow" id="btn-prev-sec" type="button">‹</button>
      <select id="section-select">${options}</select>
      <button class="nav-arrow" id="btn-next-sec" type="button">›</button>
    </div>
    <div class="legend" style="justify-content:space-between;">
      <div style="display:flex;gap:14px;flex-wrap:wrap;">
        <span><i class="leg-falta"></i>Me falta</span><span><i class="leg-tengo"></i>Tengo</span><span><i class="leg-rep"></i>Repetido</span>
      </div>
      <button class="pill ${state.onlyMissing?'on':''}" id="btn-only-missing" type="button">Solo lo que me falta</button>
    </div>
    <div id="album-results">${albumResultsHTML()}</div>
  `;
}
function stickerHTML(c){
  const st = statusOf(state.me, c.id);
  const cls = st===0?'falta':st===1?'tengo':'repetido';
  const badge = st===2 ? `<div class="dup-badge">x${countOf(state.me,c.id)}</div>` : '';
  const safeName = c.name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="sticker ${cls}" onclick="cycleSticker('${c.id}')">${badge}<div class="pphoto" id="ph-${c.id}">${placeholderFor(c)}</div><div class="num">${c.num}</div><div class="pname">${safeName}</div></div>`;
}
function applyOnlyMissing(cards){
  return state.onlyMissing ? cards.filter(c => statusOf(state.me,c.id)===0) : cards;
}
function currentSectionGridHTML(){
  const cards = applyOnlyMissing(currentCards());
  if(!cards.length) return `<div class="empty-state"><h3>${state.onlyMissing?'¡Completo!':'Sin cromos'}</h3>${state.onlyMissing?'No te falta nada aquí.':''}</div>`;
  return `<div class="sticker-grid">${cards.map(stickerHTML).join('')}</div>`;
}
function albumResultsHTML(){
  let matches = computeMatches(state.searchQuery);
  if(matches === null) return currentSectionGridHTML();
  matches = applyOnlyMissing(matches);
  if(matches.length===0) return `<div class="empty-state"><h3>Sin resultados</h3>Prueba con otro nombre, número o selección.</div>`;
  return `<div class="small-note" style="margin-bottom:10px;">${matches.length} resultado(s)</div><div class="sticker-grid">${matches.map(stickerHTML).join('')}</div>`;
}
function renderRepetidos(){
  const ids = Object.keys(state.me.stickers).filter(id=>state.me.stickers[id]===2);
  const exportBtn = `<button class="btn btn-ghost btn-small" style="width:100%;margin-bottom:14px;" onclick="exportPrintable()">🖨️ Exportar / imprimir mi lista</button>`;
  if(ids.length===0) return exportBtn + `<div class="empty-state"><h3>Sin repetidos aún</h3>Marca cromos como "repetido" en Mi álbum y aparecerán aquí.</div>`;
  return exportBtn + ids.map(id=>{
    const card = allCards().find(c=>c.id===id);
    if(!card) return '';
    const info = labelFor(card);
    const interested = (state.interests[state.username] && state.interests[state.username][id]) || [];
    return `<div class="card"><div class="row">
      <div><div class="item-name">${info.title}</div><div class="item-sub">#${card.num} · ${state.checklist.sectionNames[card.section]||card.section}</div>
      ${interested.length?`<div class="interest-flag">★ Interesa a: ${interested.join(', ')}</div>`:''}</div>
      <div class="stepper"><button onclick="bumpCount('${id}',-1)">–</button><span class="mono">${countOf(state.me,id)}</span><button onclick="bumpCount('${id}',1)">+</button></div>
    </div>
    <button class="pill" style="margin-top:8px;" onclick="unmarkRepeated('${id}')">Quitar de repetidos</button>
    </div>`;
  }).join('');
}
async function unmarkRepeated(id){
  state.me.stickers[id] = 1;
  delete state.me.counts[id];
  render();
  await saveMe();
}
function exportPrintable(){
  const missing = allCards().filter(c => statusOf(state.me,c.id)===0 && c.name!=='Escudo');
  const repeated = allCards().filter(c => statusOf(state.me,c.id)===2);
  const groupBy = (list) => {
    const map = {};
    list.forEach(c => { (map[c.section] = map[c.section]||[]).push(c); });
    return map;
  };
  const missingGrouped = groupBy(missing);
  const rowsHTML = (grouped) => state.checklist.order.filter(s=>grouped[s]).map(s => `
    <h3>${state.checklist.sectionNames[s]||s}</h3>
    <ul>${grouped[s].map(c=>`<li>#${c.num} — ${c.name}</li>`).join('')}</ul>
  `).join('');
  const repeatedHTML = repeated.length ? `<ul>${repeated.map(c=>`<li>#${c.num} — ${c.name} <b>(x${countOf(state.me,c.id)})</b> — ${state.checklist.sectionNames[c.section]||c.section}</li>`).join('')}</ul>` : '<p>Sin repetidos.</p>';
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Mi lista — Cromos Mundial 26</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:700px;margin:24px auto;padding:0 16px;color:#1C2419;}
    h1{font-size:22px;margin-bottom:2px;}
    .sub{color:#666;font-size:13px;margin-bottom:20px;}
    h2{font-size:17px;border-bottom:2px solid #1C2419;padding-bottom:4px;margin-top:28px;}
    h3{font-size:14px;margin:14px 0 4px;color:#444;}
    ul{margin:0 0 6px;padding-left:20px;font-size:13px;line-height:1.5;}
    @media print{ button{display:none;} }
  </style></head><body>
    <h1>Cromos Mundial 2026 — ${state.username}</h1>
    <div class="sub">Grupo ${state.groupCode} · generado el ${new Date().toLocaleDateString('es-ES')}</div>
    <button onclick="window.print()">Imprimir / guardar como PDF</button>
    <h2>Tengo repetidos (${repeated.length})</h2>
    ${repeatedHTML}
    <h2>Me falta (${missing.length})</h2>
    ${rowsHTML(missingGrouped)}
  </body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}
function rankingHTML(){
  const total = allCards().length;
  const entries = [{ username: state.username + ' (tú)', got: myProgress(), isMe:true }];
  state.members.forEach(u => entries.push({ username: u, got: progressOf(state.membersData[u]), isMe:false }));
  entries.sort((a,b)=> b.got - a.got);
  const medals = ['🥇','🥈','🥉'];
  const rows = entries.map((e,i)=>{
    const pct = total ? Math.round((e.got/total)*100) : 0;
    return `<div class="row"><div class="item-name">${medals[i]||('#'+(i+1))} ${e.username}</div>
      <div class="friend-progress"><i style="width:${pct}%"></i></div><div class="item-sub mono">${e.got}/${total}</div></div>`;
  }).join('');
  return `<div class="card">${rows}</div>`;
}
function renderAmigos(){
  if(state.members.length===0) return `<div class="empty-state"><h3>Todavía estás solo</h3>Comparte el código <b class="mono">${state.groupCode}</b> con tus amigos.</div>`;
  let html = `<div class="section-title">Ranking del grupo</div>${rankingHTML()}<div class="section-title">Repetidos disponibles</div>`;
  html += state.members.map(uname=>{
    const data = state.membersData[uname];
    const got = progressOf(data);
    const pct = Math.round((got/allCards().length)*100);
    const dupIds = Object.keys(data.stickers).filter(id=>data.stickers[id]===2 && statusOf(state.me,id)===0);
    const open = !!state.collapsed['friend-'+uname];
    let dupHtml = dupIds.length===0 ? `<div class="small-note">No tiene repetidos que te falten ahora.</div>` :
      dupIds.map(id=>{
        const card = allCards().find(c=>c.id===id);
        if(!card) return '';
        const info = labelFor(card);
        const mine = state.interests[uname] && state.interests[uname][id] && state.interests[uname][id].includes(state.username);
        return `<div class="row"><div><div class="item-name">${info.title}</div><div class="item-sub">#${card.num} · tiene ${countOf(data,id)}</div></div>
          <button class="pill ${mine?'on':''}" onclick="toggleInterest('${uname}','${id}')">${mine?'Te interesa ✓':'Me interesa'}</button></div>`;
      }).join('');
    return `<div class="card"><div class="row" style="cursor:pointer;" onclick="toggleCollapse('friend-${uname}')">
      <div class="item-name">${uname}</div><div class="friend-progress"><i style="width:${pct}%"></i></div><div class="item-sub mono">${got}/${allCards().length}</div>
    </div>${open?`<div style="margin-top:10px;">${dupHtml}</div>`:''}</div>`;
  }).join('');
  return html;
}
function renderCambios(){
  const historyToggle = `<button class="link-btn" style="margin-bottom:14px;" onclick="toggleHistory()">${state.showHistory?'Ocultar historial':'📜 Ver historial de cambios'}</button>`;
  const historyPanel = state.showHistory ? `<div class="card" id="history-panel">${historyHTML()}</div>` : '';
  if(state.members.length===0) return historyToggle + historyPanel + `<div class="empty-state"><h3>Nada que cruzar todavía</h3>Cuando tus amigos se unan aparecerán aquí los cambios posibles.</div>`;
  let html = historyToggle + historyPanel; let any=false;
  for(const uname of state.members){
    const data = state.membersData[uname];
    const give = allCards().filter(c=>state.me.stickers[c.id]===2 && statusOf(data,c.id)===0);
    const receive = allCards().filter(c=>data.stickers[c.id]===2 && statusOf(state.me,c.id)===0);
    if(give.length===0 && receive.length===0) continue;
    any = true;
    const open = !!state.collapsed['trade-'+uname];
    html += `<div class="card" id="trade-card-${uname}"><div class="row" style="cursor:pointer;" onclick="toggleCollapse('trade-${uname}')">
      <div class="item-name">${uname}</div><div class="item-sub mono">Tú das ${give.length} · recibes ${receive.length}</div></div>`;
    if(open){
      html += `<div class="section-title">Tú le puedes dar (marca lo acordado)</div>`;
      html += give.length ? give.map(c=>`<div class="row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="trade-check" data-kind="give" data-id="${c.id}"><span class="item-name">${c.name}</span></label><span class="item-sub">#${c.num}</span></div>`).join('') : `<div class="small-note">Nada por ahora.</div>`;
      html += `<div class="section-title">Tú puedes recibir (marca lo acordado)</div>`;
      html += receive.length ? receive.map(c=>`<div class="row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="trade-check" data-kind="recv" data-id="${c.id}"><span class="item-name">${c.name}</span></label><span class="item-sub">#${c.num}</span></div>`).join('') : `<div class="small-note">Nada por ahora.</div>`;
      html += `<button class="btn btn-small" style="width:100%;margin-top:12px;" onclick="registerTrade('${uname}')">✅ Registrar cambio hecho</button>`;
    }
    html += `</div>`;
  }
  if(!any) return historyToggle + historyPanel + `<div class="empty-state"><h3>Sin coincidencias todavía</h3>Cuando haya repetidos que le falten a alguien, aparecerán aquí.</div>`;
  return html;
}
async function registerTrade(uname){
  const container = document.getElementById('trade-card-'+uname);
  if(!container) return;
  const checked = Array.from(container.querySelectorAll('.trade-check:checked'));
  if(checked.length===0){ alert('Marca al menos un cromo del intercambio antes de registrarlo.'); return; }
  const gaveIds = checked.filter(el=>el.dataset.kind==='give').map(el=>el.dataset.id);
  const receivedIds = checked.filter(el=>el.dataset.kind==='recv').map(el=>el.dataset.id);
  gaveIds.forEach(id=>{
    const c = countOf(state.me,id) - 1;
    if(c<=1){ state.me.stickers[id]=1; delete state.me.counts[id]; } else { state.me.counts[id]=c; }
  });
  receivedIds.forEach(id=>{ if(statusOf(state.me,id)===0) state.me.stickers[id]=1; });
  await saveMe();
  try{
    await db.collection('groups').doc(state.groupCode).collection('trades').add({
      date: Date.now(), userA: state.username, userB: uname, gave: gaveIds, received: receivedIds
    });
  }catch(e){ console.error('No se pudo guardar el historial', e); }
  state.tradeHistoryData = null;
  alert('¡Cambio registrado! Tu álbum ya está actualizado.');
  render();
}
async function toggleHistory(){
  state.showHistory = !state.showHistory;
  if(state.showHistory && state.tradeHistoryData===null){
    try{
      const snap = await db.collection('groups').doc(state.groupCode).collection('trades').orderBy('date','desc').limit(50).get();
      state.tradeHistoryData = snap.docs.map(d=>d.data()).filter(t=>t.userA===state.username || t.userB===state.username);
    }catch(e){ state.tradeHistoryData = []; }
  }
  render();
}
function historyHTML(){
  if(state.tradeHistoryData===null) return `<div class="small-note">Cargando…</div>`;
  if(state.tradeHistoryData.length===0) return `<div class="small-note">Aún no hay cambios registrados.</div>`;
  return state.tradeHistoryData.map(t=>{
    const other = t.userA===state.username ? t.userB : t.userA;
    const gaveIds = t.userA===state.username ? t.gave : t.received;
    const recvIds = t.userA===state.username ? t.received : t.gave;
    const nameOf = id => { const c = allCards().find(x=>x.id===id); return c?c.name:id; };
    const date = new Date(t.date).toLocaleDateString('es-ES');
    return `<div class="row"><div><div class="item-name">${other} · <span class="item-sub">${date}</span></div>
      <div class="item-sub">Diste: ${gaveIds.map(nameOf).join(', ')||'—'}</div>
      <div class="item-sub">Recibiste: ${recvIds.map(nameOf).join(', ')||'—'}</div></div></div>`;
  }).join('');
}

function logoutUser(){
  localStorage.removeItem('cromos26-settings');
  state.username = null; state.groupCode = null; state.loaded = false;
  state.me = null; state.members = []; state.membersData = {}; state.interests = {};
  state.tab = 'album'; state.collapsed = {}; state.showHistory=false; state.tradeHistoryData=null; state.onlyMissing=false; state.searchQuery='';
  render();
}

/* ================================================================
   MAIN RENDER
   ================================================================ */
function render(){
  const app = document.getElementById('app');
  if(state.isAdmin){ renderAdmin(); return; }
  if(!state.username || !state.groupCode || !state.loaded){ renderSetup(); return; }

  const got = myProgress();
  const total = allCards().length;
  const pct = total ? Math.round((got/total)*100) : 0;
  const repBadge = Object.values(state.me.stickers).filter(s=>s===2).length;
  let interestBadge = 0;
  if(state.interests[state.username]) interestBadge = Object.values(state.interests[state.username]).filter(a=>a.length>0).length;

  let body = '';
  if(state.tab==='album') body = renderAlbum();
  else if(state.tab==='rep') body = renderRepetidos();
  else if(state.tab==='amigos') body = renderAmigos();
  else if(state.tab==='cambios') body = renderCambios();

  app.innerHTML = `
    <header class="topbar">
      <div class="topbar-row"><h1>Cromos 26</h1><div style="display:flex;align-items:center;gap:10px;"><span class="group-code mono">${state.groupCode} · ${state.username}</span><button class="link-btn" onclick="logoutUser()">Salir</button></div></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${got} / ${total}</span><span>${pct}%</span></div>
    </header>
    <main>${body}</main>
    <nav class="tabbar">
      <button class="${state.tab==='album'?'active':''}" onclick="switchTab('album')"><span class="ic">▦</span>Álbum</button>
      <button class="${state.tab==='rep'?'active':''}" onclick="switchTab('rep')"><span class="ic">◈</span>Repetidos${repBadge?`<span class="badge">${repBadge}</span>`:''}</button>
      <button class="${state.tab==='amigos'?'active':''}" onclick="switchTab('amigos')"><span class="ic">◎</span>Amigos</button>
      <button class="${state.tab==='cambios'?'active':''}" onclick="switchTab('cambios')"><span class="ic">⇄</span>Cambios${interestBadge?`<span class="badge">${interestBadge}</span>`:''}</button>
    </nav>
  `;

  if(state.tab==='album'){
    const sb = document.getElementById('search-box');
    if(sb){
      sb.oninput = (e) => {
        state.searchQuery = e.target.value;
        document.getElementById('album-results').innerHTML = albumResultsHTML();
        const matches = computeMatches(state.searchQuery);
        if(matches) loadPhotosFor(matches);
      };
    }
    const sel = document.getElementById('section-select');
    if(sel){
      sel.onchange = (e) => { state.currentSection = e.target.value; state.searchQuery=''; render(); };
    }
    const onlyBtn = document.getElementById('btn-only-missing');
    if(onlyBtn){
      onlyBtn.onclick = () => {
        state.onlyMissing = !state.onlyMissing;
        document.getElementById('album-results').innerHTML = albumResultsHTML();
        onlyBtn.classList.toggle('on', state.onlyMissing);
        const activeMatches = computeMatches(state.searchQuery);
        loadPhotosCapped(activeMatches !== null ? applyOnlyMissing(activeMatches) : applyOnlyMissing(currentCards()));
      };
    }
    const navSecs = navSections();
    const idx = navSecs.indexOf(state.currentSection);
    const prevBtn = document.getElementById('btn-prev-sec');
    const nextBtn = document.getElementById('btn-next-sec');
    if(prevBtn) prevBtn.onclick = () => { state.currentSection = navSecs[(idx-1+navSecs.length)%navSecs.length]; state.searchQuery=''; render(); };
    if(nextBtn) nextBtn.onclick = () => { state.currentSection = navSecs[(idx+1)%navSecs.length]; state.searchQuery=''; render(); };

    const activeMatches = computeMatches(state.searchQuery);
    loadPhotosCapped(applyOnlyMissing(activeMatches !== null ? activeMatches : currentCards()));
  }
}

/* ================================================================
   INIT
   ================================================================ */
async function bootData(){
  await ensureAuth();
  state.checklist = await getChecklist();
  await loadGroup();
}
async function init(){
  const app = document.getElementById('app');
  app.innerHTML = `<div class="setup-wrap"><div class="setup-title">CROMOS<br><span>MUNDIAL 26</span></div><div class="setup-sub">Cargando…</div></div>`;
  const saved = localStorage.getItem('cromos26-settings');
  if(saved){
    const s = JSON.parse(saved);
    state.username = s.username; state.groupCode = s.groupCode;
    await bootData();
  }
  render();
}
init();
</script>
