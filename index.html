<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cromos Mundial 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap');

:root{
  --bg:#0E1712;
  --surface:#172420;
  --surface-2:#1E2F29;
  --line:#2C3F37;
  --text:#EDEDE2;
  --text-dim:#9FB0A6;
  --gold:#E7B84B;
  --teal:#46A38A;
  --rust:#C9683B;
  --foil-a:#E7B84B;
  --foil-b:#46A38A;
  --foil-c:#7FD1C0;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:76px;}

h1,h2,h3{font-family:'Big Shoulders Display',sans-serif;font-weight:800;letter-spacing:0.01em;margin:0;text-transform:uppercase;}
.mono{font-family:'IBM Plex Mono',monospace;}

/* ---------- Setup screen ---------- */
.setup-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;}
.setup-title{font-size:38px;line-height:0.95;color:var(--text);}
.setup-title span{color:var(--gold);}
.setup-sub{color:var(--text-dim);font-size:14px;margin:10px 0 28px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:6px;}
.field input{
  width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);
  padding:13px 14px;border-radius:var(--radius);font-size:16px;font-family:inherit;
}
.field input:focus{outline:none;border-color:var(--gold);}
.field-hint{font-size:12px;color:var(--text-dim);margin-top:6px;}
.btn{
  background:var(--gold);color:#12200; color:#14201A;border:none;padding:14px 20px;border-radius:var(--radius);
  font-family:'Big Shoulders Display',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;
  font-size:16px;cursor:pointer;width:100%;
}
.btn:active{transform:translateY(1px);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-small{width:auto;padding:8px 14px;font-size:13px;border-radius:8px;}

/* ---------- Header ---------- */
header.topbar{
  position:sticky;top:0;z-index:5;background:var(--bg);
  border-bottom:1px solid var(--line);padding:14px 18px 12px;
}
.topbar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.topbar-row h1{font-size:22px;}
.topbar-row .group-code{font-size:11px;color:var(--text-dim);}
.progress-track{height:8px;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid var(--line);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:6px;font-family:'IBM Plex Mono',monospace;}

/* ---------- Tabs (bottom nav) ---------- */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:var(--surface);border-top:1px solid var(--line);
  display:flex;max-width:560px;margin:0 auto;
}
nav.tabbar button{
  flex:1;background:none;border:none;color:var(--text-dim);padding:12px 4px 10px;
  font-family:'IBM Plex Sans';font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
}
nav.tabbar button .ic{font-size:18px;}
nav.tabbar button.active{color:var(--gold);}
nav.tabbar button .badge{
  position:absolute;transform:translate(10px,-10px);background:var(--rust);color:#fff;
  font-size:9px;border-radius:8px;padding:1px 5px;font-family:'IBM Plex Mono';
}

main{flex:1;padding:16px 16px 24px;}

/* ---------- Sticker grid (signature element) ---------- */
.team-section{margin-bottom:22px;}
.team-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0 8px 2px;border-bottom:1px dashed var(--line);margin-bottom:10px;cursor:pointer;
}
.team-header h3{font-size:15px;color:var(--text);}
.team-header .count{font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);}
.team-header .chev{color:var(--text-dim);font-size:12px;transition:transform .15s;}
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px;}
.sticker{
  aspect-ratio:1/1.15;border-radius:6px;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-family:'IBM Plex Mono';font-size:11px;user-select:none;transition:transform .1s;
}
.sticker:active{transform:scale(0.94);}
.sticker.falta{
  background:transparent;border:1px dashed var(--line);color:var(--text-dim);opacity:0.55;
}
.sticker.tengo{
  background:var(--surface-2);border:1px solid var(--teal);color:var(--text);
  box-shadow:0 2px 0 rgba(0,0,0,.3);
}
.sticker.repetido{
  background:linear-gradient(135deg,var(--foil-a),var(--foil-b) 60%,var(--foil-c));
  color:#14201A;border:1px solid var(--gold);box-shadow:0 2px 0 rgba(0,0,0,.35);
  transform:rotate(-2deg);
}
.sticker .num{font-weight:600;}
.sticker .dup-badge{
  position:absolute;top:-6px;right:-6px;background:var(--rust);color:#fff;border-radius:9px;
  font-size:9px;padding:1px 5px;font-family:'IBM Plex Mono';
}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:11px;color:var(--text-dim);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.leg-falta{border:1px dashed var(--line);}
.leg-tengo{background:var(--surface-2);border:1px solid var(--teal);}
.leg-rep{background:linear-gradient(135deg,var(--foil-a),var(--foil-b));}

/* ---------- Lists (repetidos / amigos / cambios) ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.row + .row{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
.item-name{font-size:14px;}
.item-sub{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono';}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{
  width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--surface-2);
  color:var(--text);font-size:15px;cursor:pointer;line-height:1;
}
.pill{
  border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);
  border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;
}
.pill.on{background:var(--gold);color:#14201A;border-color:var(--gold);font-weight:600;}
.friend-card .row.friend-head{cursor:pointer;}
.friend-progress{flex:1;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin:0 10px;border:1px solid var(--line);}
.friend-progress i{display:block;height:100%;background:var(--teal);}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.6;}
.empty-state h3{color:var(--text);font-size:18px;margin-bottom:8px;}

.section-title{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:20px 0 10px;}
.section-title:first-child{margin-top:0;}

.interest-flag{color:var(--gold);font-size:11px;}

/* ---------- Modal (editar equipos) ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20;display:flex;align-items:flex-end;}
.modal{
  background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:16px 16px 0 0;
  max-height:85vh;display:flex;flex-direction:column;border-top:1px solid var(--line);
}
.modal-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-body{overflow-y:auto;padding:12px 18px;}
.modal-body .field{margin-bottom:10px;}
.modal-body .field label{font-size:10px;}
.modal-foot{padding:14px 18px;border-top:1px solid var(--line);}
.close-x{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}

.top-actions{display:flex;gap:8px;margin-bottom:14px;}
.small-note{font-size:11px;color:var(--text-dim);margin-top:4px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const TOTAL_TEAMS = 48;
const PLAYERS_PER_TEAM = 19;
const SPECIALS = 68;

let state = {
  username: null,
  groupCode: null,
  teams: null,       // array of 48 names
  specials: null,     // array of 68 names
  me: null,           // {stickers:{id:0|1|2}, counts:{id:n}}
  members: [],        // list of other usernames
  membersData: {},     // username -> data
  interests: {},       // {ownerUsername:{stickerId:[usernames]}}
  tab: 'album',
  collapsed: {},
  loaded: false
};

function stickerIds(){
  const ids = [];
  for(let t=1;t<=TOTAL_TEAMS;t++){
    for(let n=1;n<=PLAYERS_PER_TEAM;n++) ids.push('T'+t+'-'+n);
  }
  for(let n=1;n<=SPECIALS;n++) ids.push('S-'+n);
  return ids;
}
const ALL_IDS = stickerIds();

function defaultTeams(){ return Array.from({length:TOTAL_TEAMS}, (_,i)=>'Selección '+(i+1)); }
function defaultSpecials(){ return Array.from({length:SPECIALS}, (_,i)=>'Especial '+(i+1)); }
function defaultMe(){ return { stickers:{}, counts:{} }; }

async function sGet(key, shared){
  try{ const r = await window.storage.get(key, !!shared); return r ? r.value : null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared){
  try{ await window.storage.set(key, value, !!shared); return true; }
  catch(e){ console.error('storage set failed', key, e); return false; }
}
async function sList(prefix, shared){
  try{ const r = await window.storage.list(prefix, !!shared); return r ? r.keys : []; }
  catch(e){ return []; }
}

function labelFor(id){
  if(id.startsWith('T')){
    const [t,n] = id.slice(1).split('-');
    return { title: state.teams[t-1], sub: '#'+n };
  } else {
    const n = id.split('-')[1];
    return { title: state.specials[n-1], sub: 'ESP' };
  }
}

async function loadAll(){
  const gc = state.groupCode;
  let teams = await sGet('group:'+gc+':teams', true);
  if(!teams){ teams = defaultTeams(); await sSet('group:'+gc+':teams', teams, true); }
  state.teams = teams;

  let specials = await sGet('group:'+gc+':specials', true);
  if(!specials){ specials = defaultSpecials(); await sSet('group:'+gc+':specials', specials, true); }
  state.specials = specials;

  let me = await sGet('group:'+gc+':user:'+state.username, true);
  if(!me){ me = defaultMe(); await sSet('group:'+gc+':user:'+state.username, me, true); }
  state.me = me;

  let interests = await sGet('group:'+gc+':interests', true);
  state.interests = interests || {};

  const keys = await sList('group:'+gc+':user:', true);
  const others = keys.filter(k => k !== 'group:'+gc+':user:'+state.username);
  const membersData = {};
  for(const k of others){
    const uname = k.split(':user:')[1];
    const d = await sGet(k, true);
    if(d) membersData[uname] = d;
  }
  state.members = Object.keys(membersData);
  state.membersData = membersData;
  state.loaded = true;
}

async function saveMe(){
  await sSet('group:'+state.groupCode+':user:'+state.username, state.me, true);
}
async function saveInterests(){
  await sSet('group:'+state.groupCode+':interests', state.interests, true);
}
async function saveTeams(){
  await sSet('group:'+state.groupCode+':teams', state.teams, true);
}
async function saveSpecials(){
  await sSet('group:'+state.groupCode+':specials', state.specials, true);
}

function statusOf(dataObj, id){ return (dataObj.stickers && dataObj.stickers[id]) || 0; }
function countOf(dataObj, id){ return (dataObj.counts && dataObj.counts[id]) || 2; }

function myProgress(){
  const ids = Object.keys(state.me.stickers || {});
  let got = 0;
  for(const id of ids) if(state.me.stickers[id] > 0) got++;
  return got;
}
function progressOf(dataObj){
  const ids = Object.keys(dataObj.stickers || {});
  let got = 0;
  for(const id of ids) if(dataObj.stickers[id] > 0) got++;
  return got;
}

async function cycleSticker(id){
  const cur = statusOf(state.me, id);
  const next = (cur + 1) % 3;
  state.me.stickers[id] = next;
  if(next === 2 && !state.me.counts[id]) state.me.counts[id] = 2;
  if(next !== 2) delete state.me.counts[id];
  render();
  await saveMe();
}

async function bumpCount(id, delta){
  const c = countOf(state.me, id) + delta;
  state.me.counts[id] = Math.max(2, c);
  render();
  await saveMe();
}

async function toggleInterest(ownerUsername, id){
  if(!state.interests[ownerUsername]) state.interests[ownerUsername] = {};
  if(!state.interests[ownerUsername][id]) state.interests[ownerUsername][id] = [];
  const arr = state.interests[ownerUsername][id];
  const i = arr.indexOf(state.username);
  if(i >= 0) arr.splice(i,1); else arr.push(state.username);
  render();
  await saveInterests();
}

/* ---------- Setup screen ---------- */
function renderSetup(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="setup-wrap">
      <div class="setup-title">CROMOS<br><span>MUNDIAL 26</span></div>
      <div class="setup-sub">Lleva el control de tu álbum (980 cromos) y organiza cambios de repetidos con tu grupo de amigos. Solo necesitas un nombre y un código de grupo — todos los que usen el mismo código comparten datos.</div>
      <div class="field">
        <label>Tu nombre</label>
        <input id="in-name" type="text" placeholder="Ej. Marta" maxlength="24">
      </div>
      <div class="field">
        <label>Código de grupo</label>
        <input id="in-group" type="text" placeholder="Ej. AMIGOS26" maxlength="24">
        <div class="field-hint">Inventa uno y compártelo con tus amigos, o usa el mismo que ellos ya tengan.</div>
      </div>
      <button class="btn" id="btn-enter">Entrar al álbum</button>
    </div>
  `;
  document.getElementById('btn-enter').onclick = async () => {
    const name = document.getElementById('in-name').value.trim();
    const group = document.getElementById('in-group').value.trim().toUpperCase();
    if(!name || !group) return;
    state.username = name;
    state.groupCode = group;
    await sSet('settings', {username:name, groupCode:group}, false);
    await loadAll();
    render();
  };
}

/* ---------- Album tab ---------- */
function renderAlbum(){
  const got = myProgress();
  let html = `<div class="legend">
    <span><i class="leg-falta"></i>Me falta</span>
    <span><i class="leg-tengo"></i>Tengo</span>
    <span><i class="leg-rep"></i>Repetido</span>
  </div>`;

  html += teamSectionHTML(null, 'Especiales', ALL_IDS.filter(id=>id.startsWith('S')));
  for(let t=1;t<=TOTAL_TEAMS;t++){
    const ids = ALL_IDS.filter(id=>id.startsWith('T'+t+'-'));
    html += teamSectionHTML(t, state.teams[t-1], ids);
  }
  return html;
}

function teamSectionHTML(t, name, ids){
  const key = t===null ? 'special' : ('t'+t);
  const collapsed = !!state.collapsed[key];
  let got = 0;
  for(const id of ids) if(statusOf(state.me,id)>0) got++;
  let grid = '';
  for(const id of ids){
    const st = statusOf(state.me, id);
    const cls = st===0?'falta':st===1?'tengo':'repetido';
    const num = id.startsWith('T') ? id.split('-')[1] : id.split('-')[1];
    const badge = st===2 ? `<div class="dup-badge">x${countOf(state.me,id)}</div>` : '';
    grid += `<div class="sticker ${cls}" data-id="${id}" onclick="cycleSticker('${id}')">${badge}<div class="num">${num}</div></div>`;
  }
  return `<div class="team-section">
    <div class="team-header" onclick="toggleCollapse('${key}')">
      <h3>${name}</h3>
      <span class="count mono">${got}/${ids.length} <span class="chev">${collapsed?'▸':'▾'}</span></span>
    </div>
    ${collapsed ? '' : `<div class="sticker-grid">${grid}</div>`}
  </div>`;
}

function toggleCollapse(key){
  state.collapsed[key] = !state.collapsed[key];
  render();
}

/* ---------- Repetidos tab ---------- */
function renderRepetidos(){
  const ids = Object.keys(state.me.stickers).filter(id => state.me.stickers[id]===2);
  if(ids.length===0){
    return `<div class="empty-state"><h3>Sin repetidos aún</h3>Marca cromos como "repetido" en Mi álbum (toca dos veces) y aparecerán aquí. Tus amigos los verán automáticamente para proponer cambios.</div>`;
  }
  let html = '';
  for(const id of ids){
    const info = labelFor(id);
    const interested = [];
    if(state.interests[state.username] && state.interests[state.username][id]) interested.push(...state.interests[state.username][id]);
    html += `<div class="card"><div class="row">
      <div><div class="item-name">${info.title}</div><div class="item-sub">${info.sub}</div>
      ${interested.length ? `<div class="interest-flag">★ Interesa a: ${interested.join(', ')}</div>` : ''}
      </div>
      <div class="stepper">
        <button onclick="bumpCount('${id}',-1)">–</button>
        <span class="mono">${countOf(state.me,id)}</span>
        <button onclick="bumpCount('${id}',1)">+</button>
      </div>
    </div></div>`;
  }
  return html;
}

/* ---------- Amigos tab ---------- */
function renderAmigos(){
  if(state.members.length===0){
    return `<div class="empty-state"><h3>Todavía estás solo</h3>Comparte el código de grupo <b class="mono">${state.groupCode}</b> con tus amigos para que se unan y veáis vuestros repetidos.</div>`;
  }
  let html = '';
  for(const uname of state.members){
    const data = state.membersData[uname];
    const got = progressOf(data);
    const pct = Math.round((got/ALL_IDS.length)*100);
    const dupIds = Object.keys(data.stickers).filter(id => data.stickers[id]===2 && statusOf(state.me,id)===0);
    const open = !!state.collapsed['friend-'+uname];
    let dupHtml = '';
    if(dupIds.length===0){
      dupHtml = `<div class="small-note">No tiene repetidos que te falten ahora mismo.</div>`;
    } else {
      for(const id of dupIds){
        const info = labelFor(id);
        const mine = state.interests[uname] && state.interests[uname][id] && state.interests[uname][id].includes(state.username);
        dupHtml += `<div class="row"><div><div class="item-name">${info.title}</div><div class="item-sub">${info.sub} · tiene ${countOf(data,id)}</div></div>
          <button class="pill ${mine?'on':''}" onclick="toggleInterest('${uname}','${id}')">${mine?'Te interesa ✓':'Me interesa'}</button>
        </div>`;
      }
    }
    html += `<div class="card friend-card">
      <div class="row friend-head" onclick="toggleCollapse('friend-${uname}')">
        <div class="item-name">${uname}</div>
        <div class="friend-progress"><i style="width:${pct}%"></i></div>
        <div class="item-sub mono">${got}/${ALL_IDS.length}</div>
      </div>
      ${open ? `<div style="margin-top:10px;">${dupHtml}</div>` : ''}
    </div>`;
  }
  return html;
}

/* ---------- Cambios tab ---------- */
function renderCambios(){
  if(state.members.length===0){
    return `<div class="empty-state"><h3>Nada que cruzar todavía</h3>Cuando tus amigos se unan al grupo, aquí verás automáticamente qué cromos podéis intercambiaros.</div>`;
  }
  let html = '';
  let any = false;
  for(const uname of state.members){
    const data = state.membersData[uname];
    const give = ALL_IDS.filter(id => state.me.stickers[id]===2 && statusOf(data,id)===0);
    const receive = ALL_IDS.filter(id => data.stickers[id]===2 && statusOf(state.me,id)===0);
    if(give.length===0 && receive.length===0) continue;
    any = true;
    const open = !!state.collapsed['trade-'+uname];
    html += `<div class="card">
      <div class="row friend-head" onclick="toggleCollapse('trade-${uname}')">
        <div class="item-name">${uname}</div>
        <div class="item-sub mono">Tú das ${give.length} · recibes ${receive.length}</div>
      </div>`;
    if(open){
      html += `<div class="section-title">Tú le puedes dar</div>`;
      html += give.length ? give.map(id=>{const i=labelFor(id);return `<div class="row"><div class="item-name">${i.title}</div><div class="item-sub">${i.sub}</div></div>`}).join('') : `<div class="small-note">Nada por ahora.</div>`;
      html += `<div class="section-title">Tú puedes recibir</div>`;
      html += receive.length ? receive.map(id=>{const i=labelFor(id);return `<div class="row"><div class="item-name">${i.title}</div><div class="item-sub">${i.sub}</div></div>`}).join('') : `<div class="small-note">Nada por ahora.</div>`;
    }
    html += `</div>`;
  }
  if(!any) return `<div class="empty-state"><h3>Sin coincidencias todavía</h3>Cuando tengas repetidos que a un amigo le falten (o al revés), aparecerán aquí listos para quedar.</div>`;
  return html;
}

/* ---------- Edit teams modal ---------- */
function openEditTeams(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'edit-modal';
  let fields = state.teams.map((t,i)=>`<div class="field"><label>Selección ${i+1}</label><input data-idx="${i}" type="text" value="${t.replace(/"/g,'&quot;')}"></div>`).join('');
  backdrop.innerHTML = `<div class="modal">
    <div class="modal-head"><h3 style="font-size:16px;">Editar equipos</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${fields}</div>
    <div class="modal-foot"><button class="btn" id="save-teams">Guardar</button></div>
  </div>`;
  document.body.appendChild(backdrop);
  document.getElementById('save-teams').onclick = async () => {
    const inputs = backdrop.querySelectorAll('input[data-idx]');
    inputs.forEach(inp => { state.teams[inp.dataset.idx] = inp.value.trim() || state.teams[inp.dataset.idx]; });
    await saveTeams();
    closeModal();
    render();
  };
}
function closeModal(){
  const m = document.getElementById('edit-modal');
  if(m) m.remove();
}

/* ---------- Main render ---------- */
async function switchTab(tab){
  state.tab = tab;
  render();
}

function render(){
  const app = document.getElementById('app');
  if(!state.username || !state.groupCode || !state.loaded){
    renderSetup();
    return;
  }
  const got = myProgress();
  const pct = Math.round((got/ALL_IDS.length)*100);

  let repBadge = Object.values(state.me.stickers).filter(s=>s===2).length;
  let interestBadge = 0;
  if(state.interests[state.username]) interestBadge = Object.values(state.interests[state.username]).filter(a=>a.length>0).length;

  let body = '';
  if(state.tab==='album') body = renderAlbum();
  else if(state.tab==='rep') body = renderRepetidos();
  else if(state.tab==='amigos') body = renderAmigos();
  else if(state.tab==='cambios') body = renderCambios();

  app.innerHTML = `
    <header class="topbar">
      <div class="topbar-row">
        <h1>Cromos 26</h1>
        <span class="group-code mono">${state.groupCode} · ${state.username}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span>${got} / ${ALL_IDS.length}</span><span>${pct}%</span></div>
      ${state.tab==='album' ? `<div class="top-actions" style="margin-top:12px;"><button class="btn btn-ghost btn-small" onclick="openEditTeams()">Editar nombres de equipos</button></div>` : ''}
    </header>
    <main>${body}</main>
    <nav class="tabbar">
      <button class="${state.tab==='album'?'active':''}" onclick="switchTab('album')"><span class="ic">▦</span>Álbum</button>
      <button class="${state.tab==='rep'?'active':''}" onclick="switchTab('rep')" style="position:relative;"><span class="ic">◈</span>Repetidos${repBadge?`<span class="badge">${repBadge}</span>`:''}</button>
      <button class="${state.tab==='amigos'?'active':''}" onclick="switchTab('amigos')"><span class="ic">◎</span>Amigos</button>
      <button class="${state.tab==='cambios'?'active':''}" onclick="switchTab('cambios')" style="position:relative;"><span class="ic">⇄</span>Cambios${interestBadge?`<span class="badge">${interestBadge}</span>`:''}</button>
    </nav>
  `;
}

/* ---------- Init ---------- */
async function init(){
  const app = document.getElementById('app');
  app.innerHTML = `<div class="setup-wrap"><div class="setup-title">CROMOS<br><span>MUNDIAL 26</span></div><div class="setup-sub">Cargando…</div></div>`;
  const settings = await sGet('settings', false);
  if(settings && settings.username && settings.groupCode){
    state.username = settings.username;
    state.groupCode = settings.groupCode;
    await loadAll();
  }
  render();
}
init();
</script>
</body>
</html>
